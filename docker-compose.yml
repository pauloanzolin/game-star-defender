services:
  star-defender:
    build: .
    image: star-defender:latest
    container_name: star-defender
    ports:
      - "3550:80"          # acesse em http://localhost:3550
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
